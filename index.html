<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mundial 2026 - FIFA World Cup™</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-mundial">
                <img src="https://cdn-icons-png.flaticon.com/512/53/53283.png" alt="Balón de Fútbol" class="balon-icono">
                <h1>FIFA WORLD CUP 2026™</h1>
            </div>
            <div class="controles">
                <label for="buscar">Buscar País:</label>
                <input id="buscar" type="text" placeholder="Ej: España, Brasil...">
                <button id="toggle-tema">Modo Oscuro</button>
                <button id="btn-ver-favoritos">⭐ Mis Favoritos</button>
            </div>
        </div>
    </header>

    <main>
        <button id="cargar" class="btn-principal">Cargar Selecciones</button>
        <section id="galeria"></section>
    </main>

    <div id="modal-equipo" class="modal oculta">
        <div class="modal-contenido">
            <span class="cerrar-modal">&times;</span>
            <div class="modal-cabecera">
                <img id="modal-bandera" src="" alt="Bandera">
                <h2 id="modal-titulo">Nombre Equipo</h2>
            </div>
            <div class="modal-info">
                <p><strong>Director Técnico (DT):</strong> <span id="modal-dt"></span></p>
                <h3>Jugadores Clave (Proyección 2026):</h3>
                <ul id="modal-jugadores"></ul>
            </div>
        </div>
    </div>

    <footer>
        <p>Desarrollado por Maxi - Analista Programador - Proyecto FIFA 2026™</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
